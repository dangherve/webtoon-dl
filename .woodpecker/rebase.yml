when:
  - event: push
    branch:
        exclude: master

clone:
  - name: git
    image: woodpeckerci/plugin-git
    settings:
       partial: false
       recursive: false

steps:
  - name: sync repo
    image: dangherve/owngit
    commands:
        - ./buildTools/mainBranch.sh
        - ./buildTools/rebase.sh
